services:
  - type: static
    name: cutmix
    buildCommand: npm install --legacy-peer-deps && npx vite build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GROQ_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
